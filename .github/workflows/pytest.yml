name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system tools (qemu-img für VM-Disk-Tests)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qemu-utils

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e core/
          pip install ruff

      - name: Ruff lint
        run: ruff check core/

      - name: Run pytest
        run: |
          cd core
          PYTHONPATH=src pytest tests/ -v --tb=short

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        # Blockiert nur bei echten Fehlern (severity=error). Warnungen (react-
        # hooks-v7-Rauschen, exhaustive-deps-Altfälle, explizite any) bleiben
        # sichtbar, brechen den Build aber nicht.
        run: npx eslint .
