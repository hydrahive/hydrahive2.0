name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Build
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Backend-Tests
        run: |
          cd /opt/hydrahive2
          .venv/bin/pytest core/tests/ -q --tb=short -x

      - name: Frontend-Typecheck & Build
        run: |
          cd /opt/hydrahive2/frontend
          npm run build

  deploy:
    name: Deploy → Testserver (.216)
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Deploy
        run: bash /opt/hydrahive2/scripts/ci-deploy.sh
