[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hydrahive-core"
version = "2.0.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "pyjwt>=2.8",
    "litellm>=1.40",
    "httpx>=0.27",
]

[project.scripts]
hydrahive = "hydrahive.api.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/hydrahive"]
