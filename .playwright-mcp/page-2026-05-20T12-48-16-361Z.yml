- generic [ref=e2]: "package agent import ( \"context\" \"encoding/json\" \"fmt\" \"sync\" \"time\" ) // EventType defines the type of event type EventType string const ( EventUserInput EventType = \"user_input\" EventLLMRequest EventType = \"llm_request\" EventLLMResponse EventType = \"llm_response\" EventToolCall EventType = \"tool_call\" EventToolResult EventType = \"tool_result\" EventError EventType = \"error\" EventComplete EventType = \"complete\" ) // Event is a structured event for the agent type Event struct { Type EventType `json:\"type\"` Timestamp time.Time `json:\"timestamp\"` Data json.RawMessage `json:\"data\"` } // EventData contains the actual data for each event type type EventData struct { UserInput string `json:\"user_input,omitempty\"` LLMRequest struct { Model string `json:\"model\"` Messages []Message `json:\"messages\"` } `json:\"llm_request,omitempty\"` LLMResponse struct { Content string `json:\"content\"` Model string `json:\"model\"` Usage Usage `json:\"usage,omitempty\"` } `json:\"llm_response,omitempty\"` ToolCall struct { Name string `json:\"name\"` Arguments json.RawMessage `json:\"arguments\"` } `json:\"tool_call,omitempty\"` ToolResult struct { Name string `json:\"name\"` Success bool `json:\"success\"` Output string `json:\"output,omitempty\"` Error string `json:\"error,omitempty\"` } `json:\"tool_result,omitempty\"` Error struct { Message string `json:\"message\"` Code string `json:\"code,omitempty\"` } `json:\"error,omitempty\"` } // Message is a chat message type Message struct { Role string `json:\"role\"` Content string `json:\"content\"` } // Usage contains token usage type Usage struct { InputTokens int `json:\"input_tokens\"` OutputTokens int `json:\"output_tokens\"` } // EventEmitter emits events to listeners type EventEmitter struct { listeners []chan<- Event mu sync.RWMutex } // NewEventEmitter creates a new emitter func NewEventEmitter() *EventEmitter { return &EventEmitter{ listeners: make([]chan<- Event, 0), } } // Subscribe adds a listener channel func (e *EventEmitter) Subscribe(ch chan<- Event) { e.mu.Lock() defer e.mu.Unlock() e.listeners = append(e.listeners, ch) } // Unsubscribe removes a listener func (e *EventEmitter) Unsubscribe(ch chan<- Event) { e.mu.Lock() defer e.mu.Unlock() for i, l := range e.listeners { if l == ch { e.listeners = append(e.listeners[:i], e.listeners[i+1:]...) return } } } // Emit sends an event to all listeners func (e *EventEmitter) Emit(ctx context.Context, event Event) { e.mu.RLock() defer e.mu.RUnlock() event.Timestamp = time.Now() for _, ch := range e.listeners { select { case <-ctx.Done(): return case ch <- event: default: // Channel full, skip } } } // ToJSON converts event to JSON line func (e *Event) ToJSON() ([]byte, error) { return json.Marshal(e) } // ToJSONL converts a slice of events to JSON Lines format func ToJSONL(events []Event) ([]byte, error) { var lines []byte for _, ev := range events { line, err := ev.ToJSON() if err != nil { return nil, err } lines = append(lines, line...) lines = append(lines, '\\n') } return lines, nil } // NewUserInputEvent creates a user input event func NewUserInputEvent(input string) Event { data := EventData{UserInput: input} raw, _ := json.Marshal(data) return Event{Type: EventUserInput, Data: raw} } // NewLLMRequestEvent creates an LLM request event func NewLLMRequestEvent(messages []Message) Event { data := EventData{} data.LLMRequest.Messages = messages raw, _ := json.Marshal(data) return Event{Type: EventLLMRequest, Data: raw} } // NewLLMResponseEvent creates an LLM response event func NewLLMResponseEvent(content, model string, usage Usage) Event { data := EventData{} data.LLMResponse.Content = content data.LLMResponse.Model = model data.LLMResponse.Usage = usage raw, _ := json.Marshal(data) return Event{Type: EventLLMResponse, Data: raw} } // NewToolCallEvent creates a tool call event func NewToolCallEvent(name string, args json.RawMessage) Event { data := EventData{} data.ToolCall.Name = name data.ToolCall.Arguments = args raw, _ := json.Marshal(data) return Event{Type: EventToolCall, Data: raw} } // NewToolResultEvent creates a tool result event func NewToolResultEvent(name, output string, success bool, errMsg string) Event { data := EventData{} data.ToolResult.Name = name data.ToolResult.Output = output data.ToolResult.Success = success data.ToolResult.Error = errMsg raw, _ := json.Marshal(data) return Event{Type: EventToolResult, Data: raw} } // NewErrorEvent creates an error event func NewErrorEvent(msg, code string) Event { data := EventData{} data.Error.Message = msg data.Error.Code = code raw, _ := json.Marshal(data) return Event{Type: EventError, Data: raw} } // NewCompleteEvent creates a completion event func NewCompleteEvent() Event { return Event{Type: EventComplete} } // ParseToolCall parses a tool call from LLM response // LLM should respond with JSON: {\"tool\": \"name\", \"args\": {...}} type ToolCall struct { Name string `json:\"tool\"` Arguments json.RawMessage `json:\"args\"` } // ParseToolCalls extracts tool calls from LLM response content // Returns nil if no tool call detected func ParseToolCalls(content string) ([]ToolCall, error) { // Try to parse as JSON array var calls []ToolCall if err := json.Unmarshal([]byte(content), &calls); err == nil { return calls, nil } // Try to parse as single object var call ToolCall if err := json.Unmarshal([]byte(content), &call); err == nil { if call.Name != \"\" { return []ToolCall{call}, nil } } return nil, fmt.Errorf(\"no valid tool call in: %s\", content) }"