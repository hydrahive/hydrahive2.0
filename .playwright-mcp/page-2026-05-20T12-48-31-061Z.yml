- generic [ref=e2]: "package agent import ( \"context\" \"projektx/internal/llm\" ) // LLMAdapter wraps an llm.LLMProvider for use in the agent loop type LLMAdapter struct { provider llm.LLMProvider } // NewLLMAdapter creates a new adapter func NewLLMAdapter(provider llm.LLMProvider) *LLMAdapter { return &LLMAdapter{provider: provider} } // Chat implements LLMProvider for the agent loop func (a *LLMAdapter) Chat(ctx context.Context, req AgentRequest) (*AgentResponse, error) { // Convert agent messages to llm messages messages := make([]llm.Message, len(req.Messages)) for i, m := range req.Messages { messages[i] = llm.Message{ Role: m.Role, Content: m.Content, } } // Call the provider resp, err := a.provider.Chat(ctx, llm.ChatRequest{ Model: req.Model, Messages: messages, Stream: req.Stream, }) if err != nil { return nil, err } // Convert back return &AgentResponse{ Content: resp.Content, Model: resp.Model, Usage: Usage{ InputTokens: resp.Usage.InputTokens, OutputTokens: resp.Usage.OutputTokens, }, }, nil }"