- generic [ref=e2]: "package llm import ( \"context\" \"fmt\" ) // ChatRequest ist eine Chat-Anfrage type ChatRequest struct { Model string Messages []Message Stream bool } // Message ist eine einzelne Nachricht type Message struct { Role string // \"user\", \"assistant\", \"system\" Content string } // ChatResponse ist eine Chat-Antwort type ChatResponse struct { Content string Model string Usage Usage } // Usage enthält Token-Nutzung type Usage struct { InputTokens int OutputTokens int } // LLMProvider ist das Interface für LLM-Provider type LLMProvider interface { Chat(ctx context.Context, req ChatRequest) (*ChatResponse, error) GetName() string } // ProviderRegistry verwaltet alle Provider type ProviderRegistry struct { providers map[string]LLMProvider } var registry = &ProviderRegistry{ providers: make(map[string]LLMProvider), } // ProviderFunc ist eine Funktion die einen Provider erstellt type ProviderFunc func() LLMProvider // RegisterProvider registriert einen Provider func RegisterProvider(name string, fn ProviderFunc) { registry.providers[name] = fn() } // NewProvider erstellt einen Provider nach Namen func NewProvider(name string) (LLMProvider, error) { p, ok := registry.providers[name] if !ok { return nil, fmt.Errorf(\"unbekannter provider: %s\", name) } return p, nil } // ListProviders gibt alle verfügbaren Provider zurück func ListProviders() []string { var names []string for name := range registry.providers { names = append(names, name) } return names }"