- generic [ref=e2]: "package llm import ( \"bytes\" \"context\" \"encoding/json\" \"fmt\" \"io\" \"net/http\" \"os\" \"time\" ) // NVIDIAProvider implements LLMProvider for NVIDIA NIM type NVIDIAProvider struct { APIKey string Endpoint string Model string client *http.Client } // NewNVIDIAProvider creates a new NVIDIA provider func NewNVIDIAProvider(apiKey, model string) *NVIDIAProvider { if apiKey == \"\" { apiKey = os.Getenv(\"PROJEKTX_NVIDIA_API_KEY\") } if model == \"\" { model = os.Getenv(\"PROJEKTX_NVIDIA_MODEL\") if model == \"\" { model = \"meta/llama-3.1-70b-instruct\" } } endpoint := os.Getenv(\"PROJEKTX_NVIDIA_ENDPOINT\") if endpoint == \"\" { endpoint = \"https://integrate.api.nvidia.com/v1\" } return &NVIDIAProvider{ APIKey: apiKey, Endpoint: endpoint, Model: model, client: &http.Client{Timeout: 60 * time.Second}, } } // GetName returns \"nvidia\" func (p *NVIDIAProvider) GetName() string { return \"nvidia\" } // Chat sends a chat request to NVIDIA NIM func (p *NVIDIAProvider) Chat(ctx context.Context, req ChatRequest) (*ChatResponse, error) { url := p.Endpoint + \"/chat/completions\" model := req.Model if model == \"\" { model = p.Model } payload := map[string]interface{}{ \"model\": model, \"messages\": req.Messages, \"stream\": false, } jsonBody, err := json.Marshal(payload) if err != nil { return nil, fmt.Errorf(\"marshal error: %w\", err) } httpReq, err := http.NewRequestWithContext(ctx, \"POST\", url, bytes.NewReader(jsonBody)) if err != nil { return nil, fmt.Errorf(\"request error: %w\", err) } httpReq.Header.Set(\"Content-Type\", \"application/json\") httpReq.Header.Set(\"Authorization\", \"Bearer \"+p.APIKey) httpReq.Header.Set(\"nv-idk\", p.APIKey) resp, err := p.client.Do(httpReq) if err != nil { return nil, fmt.Errorf(\"HTTP error: %w\", err) } defer resp.Body.Close() if resp.StatusCode != http.StatusOK { body, _ := io.ReadAll(resp.Body) return nil, fmt.Errorf(\"API error: %d %s\", resp.StatusCode, string(body)) } var nvidiaResp struct { Choices []struct { Message struct { Content string `json:\"content\"` } `json:\"message\"` } `json:\"choices\"` Usage struct { PromptTokens int `json:\"prompt_tokens\"` CompletionTokens int `json:\"completion_tokens\"` TotalTokens int `json:\"total_tokens\"` } `json:\"usage\"` } if err := json.NewDecoder(resp.Body).Decode(&nvidiaResp); err != nil { return nil, fmt.Errorf(\"decode error: %w\", err) } if len(nvidiaResp.Choices) == 0 { return nil, fmt.Errorf(\"no choices returned\") } return &ChatResponse{ Content: nvidiaResp.Choices[0].Message.Content, Model: model, Usage: Usage{ InputTokens: nvidiaResp.Usage.PromptTokens, OutputTokens: nvidiaResp.Usage.CompletionTokens, }, }, nil } // Register NVIDIA provider func init() { RegisterProvider(\"nvidia\", func() LLMProvider { return NewNVIDIAProvider(\"\", \"\") }) }"