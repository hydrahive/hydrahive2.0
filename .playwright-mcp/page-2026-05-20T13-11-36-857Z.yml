- generic [ref=e2]: "package agent import ( \"context\" \"fmt\" \"projektx/internal/mcp\" ) // Loop implements the agent tool-use cycle type Loop struct { llm LLMProvider emitter *EventEmitter maxIter int } // LLMProvider interface for LLM access type LLMProvider interface { Chat(ctx context.Context, req AgentRequest) (*AgentResponse, error) } // AgentRequest is the request type for the agent type AgentRequest struct { Model string Messages []Message Stream bool } // AgentResponse is the response type for the agent type AgentResponse struct { Content string Model string Usage Usage } // NewLoop creates a new agent loop func NewLoop(llm LLMProvider, emitter *EventEmitter) *Loop { return &Loop{ llm: llm, emitter: emitter, maxIter: 10, // Max iterations to prevent infinite loops } } // Run executes the agent loop with a single user input func (l *Loop) Run(ctx context.Context, userInput string, systemPrompt string) (string, error) { // Build initial messages messages := []Message{} if systemPrompt != \"\" { messages = append(messages, Message{Role: \"system\", Content: systemPrompt}) } messages = append(messages, Message{Role: \"user\", Content: userInput}) // Emit user input event l.emitEvent(ctx, NewUserInputEvent(userInput)) // Loop: LLM → Tool → Result → LLM for iter := 0; iter < l.maxIter; iter++ { // 1. Send to LLM l.emitEvent(ctx, NewLLMRequestEvent(messages)) resp, err := l.llm.Chat(ctx, AgentRequest{ Model: \"\", Messages: messages, Stream: false, }) if err != nil { l.emitEvent(ctx, NewErrorEvent(err.Error(), \"llm_error\")) return \"\", fmt.Errorf(\"LLM error: %w\", err) } // 2. Emit LLM response l.emitEvent(ctx, NewLLMResponseEvent(resp.Content, resp.Model, resp.Usage)) // 3. Check for tool calls calls, err := ParseToolCalls(resp.Content) if err != nil { // No tool call, return the response l.emitEvent(ctx, NewCompleteEvent()) return resp.Content, nil } // 4. Execute each tool call for _, call := range calls { toolResult, err := l.executeTool(ctx, call) if err != nil { l.emitEvent(ctx, NewErrorEvent(err.Error(), \"tool_error\")) messages = append(messages, Message{ Role: \"assistant\", Content: resp.Content, }) messages = append(messages, Message{ Role: \"tool\", Content: fmt.Sprintf(\"Error: %v\", err), }) continue } // 5. Add tool result to messages messages = append(messages, Message{ Role: \"assistant\", Content: resp.Content, }) messages = append(messages, Message{ Role: \"tool\", Content: toolResult, }) } } return \"\", fmt.Errorf(\"max iterations (%d) exceeded\", l.maxIter) } // executeTool executes a tool and returns the result func (l *Loop) executeTool(ctx context.Context, call ToolCall) (string, error) { // Emit tool call event l.emitEvent(ctx, NewToolCallEvent(call.Name, call.Arguments)) // Get tool from MCP registry result, err := mcp.CallTool(ctx, call.Name, call.Arguments) if err != nil { l.emitEvent(ctx, NewToolResultEvent(call.Name, \"\", false, err.Error())) return \"\", fmt.Errorf(\"tool error: %w\", err) } // Emit result var output string if len(result.Content) > 0 && result.Content[0].Type == \"text\" { output = result.Content[0].Text } l.emitEvent(ctx, NewToolResultEvent(call.Name, output, !result.IsError, \"\")) return output, nil } // emitEvent sends an event if emitter exists func (l *Loop) emitEvent(ctx context.Context, event Event) { if l.emitter != nil { l.emitter.Emit(ctx, event) } } // SystemPrompt returns the default system prompt for the agent func SystemPrompt() string { return `Du bist ProjektX, ein CLI-Assistent. Du kannst Tools verwenden um Aufgaben zu erledigen. Antworte mit JSON im Format: {\"tool\": \"tool_name\", \"args\": {\"key\": \"value\"}} Wenn du keine Tools brauchst, antworte einfach normal. Verfügbare Tools: read_file, write_file, list_dir` }"