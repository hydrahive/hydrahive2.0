- generic [ref=e2]: "package llm import ( \"bytes\" \"context\" \"encoding/json\" \"fmt\" \"io\" \"net/http\" \"os\" \"time\" ) // ClaudeProvider implements LLMProvider for Anthropic Claude type ClaudeProvider struct { APIKey string Model string client *http.Client } // NewClaudeProvider creates a new Claude provider func NewClaudeProvider(apiKey, model string) *ClaudeProvider { if apiKey == \"\" { apiKey = os.Getenv(\"PROJEKTX_CLAUDE_API_KEY\") } if model == \"\" { model = os.Getenv(\"PROJEKTX_CLAUDE_MODEL\") if model == \"\" { model = \"claude-3-5-sonnet-20241022\" } } return &ClaudeProvider{ APIKey: apiKey, Model: model, client: &http.Client{Timeout: 60 * time.Second}, } } // GetName returns \"claude\" func (p *ClaudeProvider) GetName() string { return \"claude\" } // Chat sends a chat request to Claude func (p *ClaudeProvider) Chat(ctx context.Context, req ChatRequest) (*ChatResponse, error) { url := \"https://api.anthropic.com/v1/messages\" model := req.Model if model == \"\" { model = p.Model } // Convert messages to Claude format (multi-message support) messages := make([]map[string]string, 0, len(req.Messages)) for _, msg := range req.Messages { role := msg.Role if role == \"assistant\" { role = \"assistant\" } messages = append(messages, map[string]string{ \"role\": role, \"content\": msg.Content, }) } payload := map[string]interface{}{ \"model\": model, \"messages\": messages, \"max_tokens\": 4096, } jsonBody, err := json.Marshal(payload) if err != nil { return nil, fmt.Errorf(\"marshal error: %w\", err) } httpReq, err := http.NewRequestWithContext(ctx, \"POST\", url, bytes.NewReader(jsonBody)) if err != nil { return nil, fmt.Errorf(\"request error: %w\", err) } httpReq.Header.Set(\"Content-Type\", \"application/json\") httpReq.Header.Set(\"x-api-key\", p.APIKey) httpReq.Header.Set(\"anthropic-version\", \"2023-06-01\") resp, err := p.client.Do(httpReq) if err != nil { return nil, fmt.Errorf(\"HTTP error: %w\", err) } defer resp.Body.Close() if resp.StatusCode != http.StatusOK { body, _ := io.ReadAll(resp.Body) return nil, fmt.Errorf(\"API error: %d %s\", resp.StatusCode, string(body)) } var claudeResp struct { Content []struct { Text string `json:\"text\"` } `json:\"content\"` Usage struct { InputTokens int `json:\"input_tokens\"` OutputTokens int `json:\"output_tokens\"` } `json:\"usage\"` } if err := json.NewDecoder(resp.Body).Decode(&claudeResp); err != nil { return nil, fmt.Errorf(\"decode error: %w\", err) } if len(claudeResp.Content) == 0 { return nil, fmt.Errorf(\"no content returned\") } return &ChatResponse{ Content: claudeResp.Content[0].Text, Model: model, Usage: Usage{ InputTokens: claudeResp.Usage.InputTokens, OutputTokens: claudeResp.Usage.OutputTokens, }, }, nil } // Register Claude provider func init() { RegisterProvider(\"claude\", func() LLMProvider { return NewClaudeProvider(\"\", \"\") }) }"