- generic [ref=e2]: "package agent import ( \"context\" \"encoding/json\" \"fmt\" \"io\" \"net/http\" \"sync\" ) // Server represents an HTTP server for the agent type Server struct { addr string loop *Loop mux *http.ServeMux server *http.Server // Global monitoring emitter for /events endpoint monitorEmitter *EventEmitter } // NewServer creates a new server func NewServer(addr string, loop *Loop) *Server { s := &Server{ addr: addr, loop: loop, mux: http.NewServeMux(), monitorEmitter: NewEventEmitter(), } s.setupRoutes() return s } // setupRoutes configures HTTP routes func (s *Server) setupRoutes() { // SSE endpoint for global monitoring (all events from all sessions) s.mux.HandleFunc(\"/events/global\", s.handleGlobalEvents) // SSE endpoint for session-specific events (query param: ?session=<id>) s.mux.HandleFunc(\"/events/stream\", s.handleSessionEvents) // Chat endpoint (session-isolated) s.mux.HandleFunc(\"/chat\", s.handleChat) // Health check s.mux.HandleFunc(\"/health\", func(w http.ResponseWriter, r *http.Request) { w.Header().Set(\"Content-Type\", \"application/json\") w.WriteHeader(http.StatusOK) w.Write([]byte(`{\"status\":\"ok\"}`)) }) } // Start starts the server func (s *Server) Start() error { s.server = &http.Server{ Addr: s.addr, Handler: s.mux, } return s.server.ListenAndServe() } // StartTLS starts the server with TLS func (s *Server) StartTLS(certFile, keyFile string) error { s.server = &http.Server{ Addr: s.addr, Handler: s.mux, } return s.server.ListenAndServeTLS(certFile, keyFile) } // Shutdown gracefully shuts down the server func (s *Server) Shutdown(ctx context.Context) error { if s.server == nil { return nil } return s.server.Shutdown(ctx) } // handleGlobalEvents streams ALL events from ALL sessions (monitoring endpoint) func (s *Server) handleGlobalEvents(w http.ResponseWriter, r *http.Request) { w.Header().Set(\"Content-Type\", \"text/event-stream\") w.Header().Set(\"Cache-Control\", \"no-cache\") w.Header().Set(\"Connection\", \"keep-alive\") w.Header().Set(\"Access-Control-Allow-Origin\", \"*\") ch := make(chan Event, 100) s.monitorEmitter.Subscribe(ch) defer s.monitorEmitter.Unsubscribe(ch) ctx := r.Context() flusher, ok := w.(http.Flusher) if !ok { http.Error(w, \"SSE not supported\", http.StatusInternalServerError) return } for { select { case <-ctx.Done(): return case ev := <-ch: data, err := json.Marshal(ev) if err != nil { continue } fmt.Fprintf(w, \"data: %s\\n\\n\", data) flusher.Flush() } } } // handleSessionEvents streams events for a specific session (?session=<id>) func (s *Server) handleSessionEvents(w http.ResponseWriter, r *http.Request) { sessionID := r.URL.Query().Get(\"session\") if sessionID == \"\" { http.Error(w, \"session query param required\", http.StatusBadRequest) return } w.Header().Set(\"Content-Type\", \"text/event-stream\") w.Header().Set(\"Cache-Control\", \"no-cache\") w.Header().Set(\"Connection\", \"keep-alive\") w.Header().Set(\"Access-Control-Allow-Origin\", \"*\") ch := make(chan Event, 100) sessionsMu.Lock() s.sessions[sessionID] = append(s.sessions[sessionID], ch) sessionsMu.Unlock() defer func() { sessionsMu.Lock() delete(s.sessions, sessionID) sessionsMu.Unlock() }() ctx := r.Context() flusher, ok := w.(http.Flusher) if !ok { http.Error(w, \"SSE not supported\", http.StatusInternalServerError) return } for { select { case <-ctx.Done(): return case ev := <-ch: data, err := json.Marshal(ev) if err != nil { continue } fmt.Fprintf(w, \"data: %s\\n\\n\", data) flusher.Flush() } } } // sessions stores channels per session ID var sessionsMu sync.Mutex var sessions = make(map[string][]chan Event) // EmitToSession sends an event to all channels subscribed to a session func (s *Server) EmitToSession(sessionID string, ev Event) { sessionsMu.Lock() defer sessionsMu.Unlock() for _, ch := range sessions[sessionID] { select { case ch <- ev: default: // Channel full, skip } } } // EmitToMonitor sends an event to the global monitoring emitter func (s *Server) EmitToMonitor(ev Event) { if s.monitorEmitter != nil { s.monitorEmitter.Emit(context.Background(), ev) } } // HTTPChatRequest represents a chat request via HTTP type HTTPChatRequest struct { Input string `json:\"input\"` System string `json:\"system,omitempty\"` } // HTTPChatResponse represents a chat response via HTTP type HTTPChatResponse struct { Response string `json:\"response\"` SessionID string `json:\"session_id,omitempty\"` Events []Event `json:\"events,omitempty\"` Error string `json:\"error,omitempty\"` } // handleChat handles chat requests with session isolation func (s *Server) handleChat(w http.ResponseWriter, r *http.Request) { if r.Method != http.MethodPost { http.Error(w, \"POST required\", http.StatusMethodNotAllowed) return } var req HTTPChatRequest if err := json.NewDecoder(r.Body).Decode(&req); err != nil { http.Error(w, \"invalid JSON\", http.StatusBadRequest) return } if req.Input == \"\" { http.Error(w, \"input required\", http.StatusBadRequest) return } // Generate session ID sessionID := fmt.Sprintf(\"%d\", len(sessions)) ch := make(chan Event, 100) // Register session channel sessionsMu.Lock() s.sessions[sessionID] = append(s.sessions[sessionID], ch) sessionsMu.Unlock() defer func() { sessionsMu.Lock() delete(s.sessions, sessionID) sessionsMu.Unlock() close(ch) }() // Create session-scoped emitter for this request sessionEmitter := NewEventEmitter() sessionEmitter.Subscribe(ch) sessionEmitter.Subscribe(s.monitorEmitter) // Also stream to global monitor // Create a loop instance with the session-scoped emitter sessionLoop := NewLoop(s.loop.llm, sessionEmitter) sessionLoop.maxIter = s.loop.maxIter // Collect events with proper synchronization var events []Event var mu sync.Mutex wg := sync.WaitGroup{} wg.Add(1) go func() { defer wg.Done() for ev := range ch { // Skip global monitor events (already subscribed) if ev.Type != EventComplete { mu.Lock() events = append(events, ev) mu.Unlock() } } }() // Execute with session-scoped loop resp, err := sessionLoop.Run(r.Context(), req.Input, req.System) // Wait for goroutine to drain all events wg.Wait() w.Header().Set(\"Content-Type\", \"application/json\") if err != nil { json.NewEncoder(w).Encode(HTTPChatResponse{ Error: err.Error(), SessionID: sessionID, }) return } json.NewEncoder(w).Encode(HTTPChatResponse{ Response: resp, SessionID: sessionID, Events: events, }) } // SSEEvent sends an SSE message func SSEEvent(w io.Writer, event Event) error { data, err := json.Marshal(event) if err != nil { return err } _, err = fmt.Fprintf(w, \"data: %s\\n\\n\", data) return err }"