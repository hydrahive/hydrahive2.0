turn nil, fmt.Errorf(\"HTTP error: %w\", err) } defer resp.Body.Close() if resp.StatusCode != http.StatusOK { body, _ := io.ReadAll(resp.Body) return nil, fmt.Errorf(\"API error: %d %s\", resp.StatusCode, string(body)) } var mmResp struct { Choices []struct { Message struct { Content string `json:\"content\"` } `json:\"message\"` } `json:\"choices\"` } if err := json.NewDecoder(resp.Body).Decode(&mmResp); err != nil { return nil, fmt.Errorf(\"decode error: %w\", err) } if len(mmResp.Choices) == 0 { return nil, fmt.Errorf(\"no choices returned\") } return &ChatResponse{ Content: mmResp.Choices[0].Message.Content, Model: model, }, nil } // Register MiniMax provider func init() { RegisterProvider(\"minimax\", func() LLMProvider { return NewMiniMaxProvider(\"\", \"\", \"\") }) }"