- generic [ref=e2]: "package agent import ( \"context\" \"encoding/json\" \"fmt\" \"io\" \"net/http\" \"sync\" ) // Server represents an HTTP server for the agent type Server struct { addr string loop *Loop mux *http.ServeMux server *http.Server } // NewServer creates a new server func NewServer(addr string, loop *Loop) *Server { s := &Server{ addr: addr, loop: loop, mux: http.NewServeMux(), } s.setupRoutes() return s } // setupRoutes configures HTTP routes func (s *Server) setupRoutes() { // SSE endpoint for event stream (global) s.mux.HandleFunc(\"/events\", s.handleEvents) // Chat endpoint (session-isolated) s.mux.HandleFunc(\"/chat\", s.handleChat) // Health check s.mux.HandleFunc(\"/health\", func(w http.ResponseWriter, r *http.Request) { w.Header().Set(\"Content-Type\", \"application/json\") w.WriteHeader(http.StatusOK) w.Write([]byte(`{\"status\":\"ok\"}`)) }) } // Start starts the server func (s *Server) Start() error { s.server = &http.Server{ Addr: s.addr, Handler: s.mux, } return s.server.ListenAndServe() } // StartTLS starts the server with TLS func (s *Server) StartTLS(certFile, keyFile string) error { s.server = &http.Server{ Addr: s.addr, Handler: s.mux, } return s.server.ListenAndServeTLS(certFile, keyFile) } // Shutdown gracefully shuts down the server func (s *Server) Shutdown(ctx context.Context) error { if s.server == nil { return nil } return s.server.Shutdown(ctx) } // handleEvents handles SSE event streaming (global, all events) func (s *Server) handleEvents(w http.ResponseWriter, r *http.Request) { // Set SSE headers w.Header().Set(\"Content-Type\", \"text/event-stream\") w.Header().Set(\"Cache-Control\", \"no-cache\") w.Header().Set(\"Connection\", \"keep-alive\") w.Header().Set(\"Access-Control-Allow-Origin\", \"*\") // Create event channel ch := make(chan Event, 100) s.loop.emitter.Subscribe(ch) defer s.loop.emitter.Unsubscribe(ch) // Get context for cleanup ctx := r.Context() flusher, ok := w.(http.Flusher) if !ok { http.Error(w, \"SSE not supported\", http.StatusInternalServerError) return } // Send events for { select { case <-ctx.Done(): return case ev := <-ch: data, err := json.Marshal(ev) if err != nil { continue } fmt.Fprintf(w, \"data: %s\\n\\n\", data) flusher.Flush() } } } // HTTPChatRequest represents a chat request via HTTP type HTTPChatRequest struct { Input string `json:\"input\"` System string `json:\"system,omitempty\"` } // HTTPChatResponse represents a chat response via HTTP type HTTPChatResponse struct { Response string `json:\"response\"` Events []Event `json:\"events,omitempty\"` Error string `json:\"error,omitempty\"` } // handleChat handles chat requests with session isolation func (s *Server) handleChat(w http.ResponseWriter, r *http.Request) { if r.Method != http.MethodPost { http.Error(w, \"POST required\", http.StatusMethodNotAllowed) return } var req HTTPChatRequest if err := json.NewDecoder(r.Body).Decode(&req); err != nil { http.Error(w, \"invalid JSON\", http.StatusBadRequest) return } if req.Input == \"\" { http.Error(w, \"input required\", http.StatusBadRequest) return } // Create session-scoped emitter for this request sessionEmitter := NewEventEmitter() // Create a loop instance with the session-scoped emitter sessionLoop := NewLoop(s.loop.llm, sessionEmitter) sessionLoop.maxIter = s.loop.maxIter // Collect events with proper synchronization var events []Event var mu sync.Mutex ch := make(chan Event, 100) // WaitGroup ensures we drain all events before returning var wg sync.WaitGroup wg.Add(1) go func() { defer wg.Done() for ev := range ch { mu.Lock() events = append(events, ev) mu.Unlock() } }() sessionEmitter.Subscribe(ch) defer sessionEmitter.Unsubscribe(ch) defer close(ch) // Execute with session-scoped loop resp, err := sessionLoop.Run(r.Context(), req.Input, req.System) // Wait for goroutine to drain all events wg.Wait() w.Header().Set(\"Content-Type\", \"application/json\") if err != nil { json.NewEncoder(w).Encode(HTTPChatResponse{ Error: err.Error(), }) return } json.NewEncoder(w).Encode(HTTPChatResponse{ Response: resp, Events: events, }) } // SSEEvent sends an SSE message func SSEEvent(w io.Writer, event Event) error { data, err := json.Marshal(event) if err != nil { return err } _, err = fmt.Fprintf(w, \"data: %s\\n\\n\", data) return err }"