- generic [ref=e2]: "package agent import ( \"bufio\" \"context\" \"encoding/json\" \"fmt\" \"io\" \"net/http\" \"strings\" \"sync\" \"sync/atomic\" ) // sessionCounter provides atomic session ID generation var sessionCounter uint64 // getNextSessionID generates a unique session ID func getNextSessionID() string { id := atomic.AddUint64(&sessionCounter, 1) return fmt.Sprintf(\"%d\", id) } // Server represents an HTTP server for the agent type Server struct { addr string loop *Loop mux *http.ServeMux server *http.Server // Global monitoring emitter for /events endpoint monitorEmitter *EventEmitter } // NewServer creates a new server func NewServer(addr string, loop *Loop) *Server { s := &Server{ addr: addr, loop: loop, mux: http.NewServeMux(), monitorEmitter: NewEventEmitter(), } s.setupRoutes() return s } // setupRoutes configures HTTP routes func (s *Server) setupRoutes() { // SSE endpoint for global monitoring (all events from all sessions) s.mux.HandleFunc(\"/events/global\", s.handleGlobalEvents) // SSE endpoint for session-specific events (query param: ?session=<id>) s.mux.HandleFunc(\"/events/stream\", s.handleSessionEvents) // Chat endpoint (session-isolated) s.mux.HandleFunc(\"/chat\", s.handleChat) // Health check s.mux.HandleFunc(\"/health\", func(w http.ResponseWriter, r *http.Request) { w.Header().Set(\"Content-Type\", \"application/json\") w.WriteHeader(http.StatusOK) w.Write([]byte(`{\"status\":\"ok\"}`)) }) } // Start starts the server func (s *Server) Start() error { s.server = &http.Server{ Addr: s.addr, Handler: s.mux, } return s.server.ListenAndServe() } // StartTLS starts the server with TLS func (s *Server) StartTLS(certFile, keyFile string) error { s.server = &http.Server{ Addr: s.addr, Handler: s.mux, } return s.server.ListenAndServeTLS(certFile, keyFile) } // Shutdown gracefully shuts down the server func (s *Server) Shutdown(ctx context.Context) error { if s.server == nil { return nil } return s.server.Shutdown(ctx) } // handleGlobalEvents streams ALL events from ALL sessions (monitoring endpoint) func (s *Server) handleGlobalEvents(w http.ResponseWriter, r *http.Request) { w.Header().Set(\"Content-Type\", \"text/event-stream\") w.Header().Set(\"Cache-Control\", \"no-cache\") w.Header().Set(\"Connection\", \"keep-alive\") w.Header().Set(\"Access-Control-Allow-Origin\", \"*\") ch := make(chan Event, 100) s.monitorEmitter.Subscribe(ch) defer s.monitorEmitter.Unsubscribe(ch) ctx := r.Context() flusher, ok := w.(http.Flusher) if !ok { http.Error(w, \"SSE not supported\", http.StatusInternalServerError) return } for { select { case <-ctx.Done(): return case ev := <-ch: data, err := json.Marshal(ev) if err != nil { continue } fmt.Fprintf(w, \"data: %s\\n\\n\", data) flusher.Flush() } } } // handleSessionEvents streams events for a specific session (?session=<id>) func (s *Server) handleSessionEvents(w http.ResponseWriter, r *http.Request) { sessionID := r.URL.Query().Get(\"session\") if sessionID == \"\" { http.Error(w, \"session query param required\", http.StatusBadRequest) return } w.Header().Set(\"Content-Type\", \"text/event-stream\") w.Header().Set(\"Cache-Control\", \"no-cache\") w.Header().Set(\"Connection\", \"keep-alive\") w.Header().Set(\"Access-Control-Allow-Origin\", \"*\") ch := make(chan Event, 100) // Register session channel in package-level sessions map registerSessionChannel(sessionID, ch) defer unregisterSessionChannel(sessionID, ch) ctx := r.Context() flusher, ok := w.(http.Flusher) if !ok { http.Error(w, \"SSE not supported\", http.StatusInternalServerError) return } for { select { case <-ctx.Done(): return case ev := <-ch: data, err := json.Marshal(ev) if err != nil { continue } fmt.Fprintf(w, \"data: %s\\n\\n\", data) flusher.Flush() } } } // sessions stores channels per session ID var sessionsMu sync.Mutex var sessionChannels = make(map[string][]chan Event) // registerSessionChannel adds a channel to a session func registerSessionChannel(sessionID string, ch chan Event) { sessionsMu.Lock() defer sessionsMu.Unlock() sessionChannels[sessionID] = append(sessionChannels[sessionID], ch) } // unregisterSessionChannel removes a channel from a session func unregisterSessionChannel(sessionID string, ch chan Event) { sessionsMu.Lock() defer sessionsMu.Unlock() channels := sessionChannels[sessionID] for i, c := range channels { if c == ch { sessionChannels[sessionID] = append(channels[:i], channels[i+1:]...) break } } if len(sessionChannels[sessionID]) == 0 { delete(sessionChannels, sessionID) } } // EmitToSession sends an event to all channels subscribed to a session func EmitToSession(sessionID string, ev Event) { sessionsMu.Lock() defer sessionsMu.Unlock() for _, ch := range sessionChannels[sessionID] { select { case ch <- ev: default: // Channel full, skip } } } // HTTPChatRequest represents a chat request via HTTP type HTTPChatRequest struct { Input string `json:\"input\"` System string `json:\"system,omitempty\"` } // HTTPChatResponse represents a chat response via HTTP type HTTPChatResponse struct { Response string `json:\"response\"` SessionID string `json:\"session_id,omitempty\"` Events []Event `json:\"events,omitempty\"` Error string `json:\"error,omitempty\"` } // handleChat handles chat requests with session isolation func (s *Server) handleChat(w http.ResponseWriter, r *http.Request) { if r.Method != http.MethodPost { http.Error(w, \"POST required\", http.StatusMethodNotAllowed) return } var req struct { Input string `json:\"input\"` System string `json:\"system,omitempty\"` Stream bool `json:\"stream\"` } if err := json.NewDecoder(r.Body).Decode(&req); err != nil { http.Error(w, \"invalid JSON\", http.StatusBadRequest) return } if req.Input == \"\" { http.Error(w, \"input required\", http.StatusBadRequest) return } // Generate unique session ID with atomic counter sessionID := getNextSessionID() ch := make(chan Event, 100) // Register session channel registerSessionChannel(sessionID, ch) defer unregisterSessionChannel(sessionID, ch) // Create session-scoped emitter for this request sessionEmitter := NewEventEmitter() sessionEmitter.Subscribe(ch) // Create a forwarding channel for global monitor monitorCh := make(chan Event, 100) sessionEmitter.Subscribe(monitorCh) go forwardToMonitor(monitorCh, s.monitorEmitter) // Create a loop instance with the session-scoped emitter sessionLoop := NewLoop(s.loop.llm, sessionEmitter) sessionLoop.maxIter = s.loop.maxIter // Collect events with proper synchronization var events []Event var mu sync.Mutex wg := sync.WaitGroup{} wg.Add(1) go func() { defer wg.Done() for ev := range ch { mu.Lock() events = append(events, ev) mu.Unlock() } }() // Execute with session-scoped loop resp, err := sessionLoop.Run(r.Context(), req.Input, req.System) // Wait for goroutine to drain all events wg.Wait() // Check if streaming was requested if req.Stream { s.handleChatStreamResponse(w, r, sessionID, resp, err) return } w.Header().Set(\"Content-Type\", \"application/json\") if err != nil { json.NewEncoder(w).Encode(HTTPChatResponse{ Error: err.Error(), SessionID: sessionID, }) return } json.NewEncoder(w).Encode(HTTPChatResponse{ Response: resp, SessionID: sessionID, Events: events, }) } // handleChatStreamResponse streams a chat response as SSE func (s *Server) handleChatStreamResponse(w http.ResponseWriter, r *http.Request, sessionID string, response string, err error) { flusher, ok := w.(http.Flusher) if !ok { http.Error(w, \"Streaming not supported\", http.StatusInternalServerError) return } w.Header().Set(\"Content-Type\", \"text/event-stream\") w.Header().Set(\"Cache-Control\", \"no-cache\") w.Header().Set(\"Connection\", \"keep-alive\") w.Header().Set(\"Access-Control-Allow-Origin\", \"*\") writer := bufio.NewWriter(w) if err != nil { fmt.Fprintf(writer, \"data: {\\\"type\\\":\\\"error\\\",\\\"session_id\\\":\\\"%s\\\",\\\"error\\\":\\\"%s\\\"}\\n\\n\", sessionID, err) writer.Flush() flusher.Flush() return } // Send tokens one by one (simulated streaming from the accumulated response) // In a real implementation, this would come from a provider's ChatStream method for _, line := range strings.Split(response, \"\\n\") { if line != \"\" { event := map[string]interface{}{ \"type\": \"token\", \"session_id\": sessionID, \"content\": line + \"\\n\", } data, _ := json.Marshal(event) fmt.Fprintf(writer, \"data: %s\\n\\n\", data) writer.Flush() flusher.Flush() } } // Send completion event event := map[string]interface{}{ \"type\": \"done\", \"session_id\": sessionID, } data, _ := json.Marshal(event) fmt.Fprintf(writer, \"data: %s\\n\\n\", data) writer.Flush() flusher.Flush() } // forwardToMonitor forwards events from a channel to the monitor emitter func forwardToMonitor(ch <-chan Event, monitor *EventEmitter) { for ev := range ch { monitor.Emit(context.Background(), ev) } } // SSEEvent sends an SSE message func SSEEvent(w io.Writer, event Event) error { data, err := json.Marshal(event) if err != nil { return err } _, err = fmt.Fprintf(w, \"data: %s\\n\\n\", data) return err }"