- generic [ref=e2]: "package llm import ( \"context\" \"fmt\" ) // ChatRequest is a chat request type ChatRequest struct { Model string Messages []Message Stream bool } // Message is a single message type Message struct { Role string // \"user\", \"assistant\", \"system\" Content string } // ChatResponse is a chat response type ChatResponse struct { Content string Model string Usage Usage } // Usage contains token usage type Usage struct { InputTokens int OutputTokens int } // LLMProvider is the interface for LLM providers type LLMProvider interface { Chat(ctx context.Context, req ChatRequest) (*ChatResponse, error) GetName() string } // ProviderRegistry manages all providers type ProviderRegistry struct { providers map[string]LLMProvider } // ProviderFunc is a function that creates a provider type ProviderFunc func() LLMProvider // NewProviderRegistry creates a new registry func NewProviderRegistry() *ProviderRegistry { return &ProviderRegistry{ providers: make(map[string]LLMProvider), } } // Register registers a provider in the registry func (r *ProviderRegistry) Register(name string, fn ProviderFunc) { r.providers[name] = fn() } // Get returns a provider by name func (r *ProviderRegistry) Get(name string) (LLMProvider, error) { p, ok := r.providers[name] if !ok { return nil, fmt.Errorf(\"unknown provider: %s\", name) } return p, nil } // List returns all available provider names func (r *ProviderRegistry) List() []string { var names []string for name := range r.providers { names = append(names, name) } return names } // globalRegistry is the default registry used for backwards compatibility var globalRegistry = NewProviderRegistry() // RegisterProvider registers a provider (backwards compatibility) func RegisterProvider(name string, fn ProviderFunc) { globalRegistry.Register(name, fn) } // NewProvider returns a provider by name (backwards compatibility) func NewProvider(name string) (LLMProvider, error) { return globalRegistry.Get(name) } // ListProviders returns all available providers (backwards compatibility) func ListProviders() []string { return globalRegistry.List() }"