# AnythingLLM — All-in-One RAG & Agent Platform
# UI auf Port 3001 — Konfiguration (LLM-Provider, API-Keys) über die Web-UI
# Storage unter /var/lib/hydrahive2/extensions/anythingllm/storage

services:
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    pull_policy: always
    container_name: anythingllm
    network_mode: host
    restart: unless-stopped
    environment:
      SERVER_PORT: "3001"
      STORAGE_DIR: "/app/server/storage"
      UID: "1000"
      GID: "1000"
      SIG_KEY: ${ANYTHINGLLM_SIG_KEY}
      SIG_SALT: ${ANYTHINGLLM_SIG_SALT}
      JWT_SECRET: ${ANYTHINGLLM_JWT_SECRET}
    volumes:
      - /var/lib/hydrahive2/extensions/anythingllm/storage:/app/server/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
